name: Trigger Deploy

on:
  push:
    branches: [main]

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger infra deploy
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.DEPLOY_PAT }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/AronCalvert/GetInTouch-infra/dispatches \
            -d '{"event_type":"frontend-updated"}'
